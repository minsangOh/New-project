name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    name: Gradle test
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run tests
        run: .\gradlew.bat test

      - name: Smoke test CLI init
        run: .\gradlew.bat run --args="--data-dir $env:RUNNER_TEMP\PstArchiveSearch init"

      - name: Smoke test scan-file help
        run: .\gradlew.bat run --args="scan-file --help"

      - name: Smoke test scan-pst help
        run: .\gradlew.bat run --args="scan-pst --help"

      - name: Smoke test encoding-probe help
        run: .\gradlew.bat run --args="encoding-probe --help"

      - name: Smoke test index-file help
        run: .\gradlew.bat run --args="index-file --help"

      - name: Smoke test index-pst help
        run: .\gradlew.bat run --args="index-pst --help"
      - name: Smoke test inspect-store help
        run: .\gradlew.bat run --args="inspect-store --help"

      - name: Smoke test sample-messages help
        run: .\gradlew.bat run --args="sample-messages --help"

      - name: Smoke test show-message help
        run: .\gradlew.bat run --args="show-message --help"

      - name: Smoke test quality-report help
        run: .\gradlew.bat run --args="quality-report --help"
